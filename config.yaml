# SRIP Track 2 filter — tunable configuration (PRD §10.3).
# Every magic number in the pipeline lives here; logic reads these, never hard-codes them.
# Secrets (OPENAI_API_KEY) are NOT in this file — they come from .env (see .env.example).

# Essay length gate (Stage 1) — units are words
essay_length:
  target_min: 100
  target_max: 350
  hard_min: 60          # word count < this -> REJECTED
  hard_max: 500         # word count > this -> REJECTED
  len_penalty_max: 5    # max soft penalty applied near the hard bounds

# Gibberish heuristics (Stage 1, §4.2) — cheap, no dictionary. ESL-safe: a hit needs
# >= min_signals of the signals below to fire together (one alone never rejects).
gibberish:
  min_signals: 2
  max_consonant_run: 7        # consonant run longer than this -> signal
  min_char_entropy: 2.5       # letter entropy below this (asdfasdf / aaaaaa) -> signal
  max_repeat_run: 5           # a run of one identical char this long -> signal
  min_unique_word_ratio: 0.3  # unique/total words below this -> signal
  min_words_for_ratio: 20     # only score the unique-word ratio with >= this many words
  min_chars: 20               # below this many letters, skip detection (too little signal)

# GPA gate + gradient (Stages 2-3, §8.1)
gpa:
  threshold: 3.3        # deny line AND bottom of the scoring gradient (owner, 2026-06-12)
  hard_floor: 2.0       # below this no explanation can rescue -> REJECTED (no Task B call)
  score_max: 40         # points awarded at a normalized GPA of 4.0
  # Deterministic normalization (Stage 2, §6.1). A bare value above gpa_max is treated as
  # weighted/out-of-scale and routed to LLM Task A; the percentage table maps detectable
  # percentages (and /10 scales x10) onto the 4.0 scale, linear toward 0 below the lowest band.
  normalization:
    gpa_max: 4.0
    percentage_max: 100
    percentage_table:   # percentage >= min_pct maps to gpa; the 87 row is the 3.3 threshold
      - {min_pct: 93, gpa: 4.0}
      - {min_pct: 90, gpa: 3.7}
      - {min_pct: 87, gpa: 3.3}
      - {min_pct: 83, gpa: 3.0}
      - {min_pct: 80, gpa: 2.7}
      - {min_pct: 77, gpa: 2.3}
      - {min_pct: 73, gpa: 2.0}

# Essay quality scoring (Stage 4, Task D)
essay_scoring:
  quality_max_each: 20  # per essay; 40 total
  grammar_penalty_max: 3

# Coursework bonus (Stage 5, Task C) — additive only, never subtracts. Grades are ignored
# unless explicitly stated below the grade floor (min_grade_pct): such a course is excluded
# entirely; any other counting course contributes a flat weight * unit (grade never scales it).
coursework:
  bonus_max: 15
  weight_cs: 1.0
  weight_math: 0.8
  weight_data: 0.6
  weight_other: 0.0
  min_grade_pct: 80     # an explicit grade below this excludes the course entirely
  unit: 3.0

# School bonus (Stage 7) — additive only, never subtracts
school:
  bonus_us_top20: 15
  bonus_intl_top50: 12
  fuzzy_match_threshold: 88

# Resume bonus (Stage 6, Phase 12) — additive only, never subtracts. bonus_max is the kill
# switch: setting it to 0 disables the stage entirely (zero fetches, zero LLM calls — exact
# pre-Phase-12 stub behavior); 10 is the live value (PRD §10.1 "120 once resume is built").
# allowed_url_hosts is the https-only SSRF allowlist — resume URLs come from an uploaded CSV,
# so only these pinned hosts are ever fetched (openissue #5: the Fillout S3 bucket).
# The weight_* knobs price the Task E signal counts deterministically (model counts, config
# prices); the sum is capped at bonus_max.
resume:
  bonus_max: 10
  max_download_bytes: 10485760   # 10 MiB streaming cap per resume; abort above this
  download_timeout_s: 20.0
  download_concurrency: 4        # download semaphore, separate from the LLM one
  allowed_url_hosts:
    - prod-fillout-oregon-s3.s3.us-west-2.amazonaws.com
  max_text_chars: 15000          # extracted-text cap; bounds Task E token spend
  weight_project: 1.5            # per relevant software/CS/data project
  weight_experience: 2.0         # per relevant internship/job/research entry
  weight_award: 1.0              # per relevant award/competition placement
  weight_skills: 2.0             # x skills_relevance (0-1)

# Cohort assignment (Phase 11, PRD §11) — downstream of ranking. Tier tokens are matched
# case-insensitively inside the free-text choice strings ("Summer 2026- HONORS" etc.).
# ORDER IS LOAD-BEARING: competitiveness/cost order, most expensive first — the cost ceiling
# ("never place a student above their first choice") is computed from list position. Per-tier
# capacities are a per-request staff input on the cohort endpoints, NOT config.
cohort:
  tiers: [honors, intensive, regular]

# LLM tasks (OpenAI). Model IDs are pinned here and swappable — verify against OpenAI's catalog.
llm:
  models:
    task_a: gpt-4.1-mini   # A: GPA normalization (mechanical extraction)
    task_b: gpt-4.1        # B: low-GPA explanation adequacy (judgment, can reject)
    task_c: gpt-4.1-mini   # C: coursework decomposition (mechanical extraction)
    task_d: gpt-4.1        # D: essay grading / gibberish / relevance (judgment, can reject)
    task_e: gpt-4.1-mini   # E: resume signal extraction (mechanical extraction, Phase 12)
  temperature: 0.2         # <= 0.2 for repeatability
  max_concurrency: 8       # bound for the asyncio.Semaphore around LLM calls
  max_retries: 2
  request_timeout_s: 60.0

# API edge caps (Phase 9) — the stateless FastAPI shell. Magic numbers, not in the handlers.
api:
  max_upload_bytes: 26214400  # 25 MiB cap on the uploaded CSV body -> 413 above this
  max_rows: 2000              # parsed-row cap (PRD scale target) -> 413/422 above this
  job_ttl_seconds: 3600       # finished job + in-memory results evicted after this (or on download)
  job_sweep_seconds: 300      # interval the background sweeper runs to drop expired jobs
